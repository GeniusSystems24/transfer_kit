name: transfer_kit
description: A comprehensive provider-agnostic file management solution for Flutter - upload, download, progress tracking, intelligent caching, background transfers, and beautiful UI widgets.
version: 3.0.0
homepage: https://github.com/geniussystems24/transfer_kit


environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  get_storage: ^2.1.1
  collection: ^1.18.0
  path_provider: ^2.1.0
  cross_file: ^0.3.5+1
  path: ^1.9.0
  flutter_animate: ^4.5.0
  intl: ^0.20.2
  logger: ^2.0.0
  uuid: ^4.0.0
  awesome_notifications: ^0.10.1
  workmanager: ^0.9.0+3
  shared_preferences: ^2.2.0

  http: ^1.0.0

  # Metadata extraction dependencies
  crypto: ^3.0.0              # SHA-256 hash
  mime: ^2.0.0                # MIME type detection
  image: ^4.0.0               # Image dimensions, EXIF, thumbnails
  video_thumbnail: ^0.5.0     # Video thumbnail extraction
  just_audio: ^0.10.5          # Audio duration and metadata
  just_waveform: ^0.0.7       # Audio waveform generation
  pdfx: ^2.0.0                # PDF page count and metadata

  # Media widgets dependencies
  background_downloader: ^9.5.4
  cached_network_image: ^3.4.1
  dashed_circular_progress_bar: ^0.0.6
  carousel_slider: ^5.0.0
  open_filex: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
