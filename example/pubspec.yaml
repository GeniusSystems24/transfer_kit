publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  transfer_kit:
    path: ../
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  video_player: ^2.10.1
  chewie: ^1.13.0
  open_filex: ^4.7.0
  just_audio: ^0.10.5
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
